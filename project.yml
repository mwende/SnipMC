name: SnippingTool
options:
  bundleIdPrefix: it.wende
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
targets:
  SnippingTool:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Snipping Tool
        CFBundleName: Snipping Tool
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: it.wende.snippingtool
        PRODUCT_NAME: Snipping Tool
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  SnippingTool:
    build:
      targets:
        SnippingTool: all
    run:
      config: Debug
