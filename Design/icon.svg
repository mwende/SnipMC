<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B5CF0"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#D946A8"/>
    </linearGradient>
    <radialGradient id="gloss" cx="50%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lens" cx="38%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#6B7BAF"/>
      <stop offset="55%" stop-color="#2B3358"/>
      <stop offset="100%" stop-color="#12162B"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#gloss)"/>

  <!-- viewfinder corner brackets -->
  <g fill="none" stroke="#FFFFFF" stroke-width="46" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 246 402 L 246 246 L 402 246"/>
    <path d="M 622 246 L 778 246 L 778 402"/>
    <path d="M 246 622 L 246 778 L 402 778"/>
    <path d="M 778 622 L 778 778 L 622 778"/>
  </g>

  <!-- camera lens -->
  <circle cx="512" cy="512" r="136" fill="none" stroke="url(#ring)" stroke-width="12"/>
  <circle cx="512" cy="512" r="118" fill="url(#lens)"/>
  <ellipse cx="466" cy="466" rx="34" ry="20" fill="#FFFFFF" fill-opacity="0.55" transform="rotate(-35 466 466)"/>
</svg>
